
LoggedOn: {{isLoggedOn}}
<div class="row" style="margin-bottom:15px;">
  <div class="col-md-3">
    <input type="file" #file placeholder="Choose file" (change)="uploadFile(file.files)" style="display:none;">
    <button type="button" class="btn btn-success" (click)="file.click()" [disabled]="uploadInProgress">Upload File</button>
    <div class="progress" *ngIf="uploadInProgress">
      <div class="progress-bar" role="progressbar" [style.width]="progress + '%'" [attr.aria-valuenow]="progress" aria-valuemin="0" aria-valuemax="100"></div>
    </div>
  </div>
  <button type="button" class="btn btn-success" (click)="callSecure()">Test Secure</button>
</div>
<ul>
  <li *ngFor="let message of messages">
    {{message}}
  </li>
</ul>
<div class="modal-bg">
  <div class="dialog">
    <!-- Large modal -->
    <button focus-index="1" class="btn btn-primary" data-toggle="modal" focus-element="autofocus" data-target=".bs-example-modal-lg">Large modal</button>

    <div class="modal fade bs-example-modal-lg" focus-group focus-group-head="loop" focus-group-tail="loop" focus-stacktabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
            <h4 class="modal-title" id="myModalLabel">Modal title</h4>
          </div>
          <div class="modal-body">
            eeeeeeee <br />
            dddddddd
            eeeeeeeeeee<br />
            rrrrrrrrrrrrr
            tttttttttttt<br />
            yyyyyyyyyyyyy
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-default" focus-element="autofocus" data-dismiss="modal">Close</button>
            <button type="button" class="btn btn-primary">Save changes</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
