<h4>Forecast</h4>
<div class="row">

  <div class="card col-lg-2" *ngFor="let forecast of forecasts">

    <span>{{forecast.day | date: 'E M/dd'}}</span>
    <span>
      <temperature [temperature]="forecast.temperatureHigh"></temperature>/
      <temperature [temperature]="forecast.temperatureLow"></temperature>
    </span>
    <span class="small">{{forecast.description}}</span>
  </div>
</div>
